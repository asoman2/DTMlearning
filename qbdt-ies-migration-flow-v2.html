<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Construction · IES Migration Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#F5F6F8;--card:#fff;--card2:#F9FAFB;--card3:#F2F4F7;
  --b:#E3E8EF;--b2:#CDD5DF;--b3:#B0BCC9;
  --t1:#111827;--t2:#374151;--t3:#6B7280;--t4:#9CA3AF;
  --s1:#1E40AF;--s1l:#EFF6FF;--s1b:#BFDBFE;
  --s2:#065F46;--s2l:#ECFDF5;--s2b:#A7F3D0;
  --s3:#4C1D95;--s3l:#F5F3FF;--s3b:#DDD6FE;
  --s4:#78350F;--s4l:#FFFBEB;--s4b:#FDE68A;
  --s5:#14532D;--s5l:#F0FDF4;--s5b:#BBF7D0;
  --ok:#15803D;--okl:#F0FDF4;--okb:#86EFAC;
  --warn:#B45309;--warnl:#FFFBEB;--warnb:#FDE68A;
  --err:#B91C1C;--errl:#FEF2F2;--errb:#FECACA;
  --ai:#1D4ED8;--ail:#EFF6FF;--aib:#BFDBFE;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);font-size:14px;color:var(--t1);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
#loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .5s}
#loader.gone{opacity:0;pointer-events:none}
.ld-mark{width:40px;height:40px;border:1px solid var(--b2);border-radius:10px;display:flex;align-items:center;justify-content:center}
.ld-mark svg{width:20px;height:20px;color:var(--s1)}
.ld-text{font-size:12px;color:var(--t3);letter-spacing:.04em}
.ld-bar{width:140px;height:2px;background:var(--b);border-radius:1px;overflow:hidden}
.ld-fill{height:100%;background:var(--s1);animation:ldp 1.5s ease-out forwards}
@keyframes ldp{from{width:0}to{width:100%}}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--b);height:52px;display:flex;align-items:center;padding:0 24px;gap:14px}
.nav-mark{width:26px;height:26px;background:var(--s1);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-mark svg{width:13px;height:13px}
.nav-brand{font-size:13px;font-weight:600;color:var(--t1)}
.nav-sep{width:1px;height:16px;background:var(--b2)}
.nav-co{font-size:11px;color:var(--t3)}
.nav-sp{flex:1}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-prog-label{font-size:11px;color:var(--t3)}
.nav-pips{display:flex;gap:4px}
.npip{height:4px;width:22px;border-radius:2px;background:var(--b);cursor:pointer;transition:background .2s,width .2s}
.npip.act{width:34px}
.npip.s1.act,.npip.s1.dn{background:var(--s1)}
.npip.s2.act,.npip.s2.dn{background:var(--s2)}
.npip.s3.act,.npip.s3.dn{background:var(--s3)}
.npip.s4.act,.npip.s4.dn{background:var(--s4)}
.npip.s5.act,.npip.s5.dn{background:var(--s5)}
.nav-pct{font-family:var(--mono);font-size:11px;color:var(--t3);min-width:26px;text-align:right}
.shell{display:grid;grid-template-columns:224px 1fr;min-height:calc(100vh - 52px)}
.sidebar{border-right:1px solid var(--b);background:var(--card);padding:16px 0 40px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sb-top{padding:0 14px 14px;border-bottom:1px solid var(--b);margin-bottom:10px}
.sb-ov{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:6px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:background .1s,color .1s;border:none;background:none;width:100%;text-align:left;font-family:var(--sans)}
.sb-ov:hover{background:var(--bg);color:var(--t2)}
.sb-ov.act{background:var(--ail);color:var(--s1)}
.sb-ov svg{width:13px;height:13px}
.sb-stage{margin-bottom:1px}
.sb-sh{display:flex;align-items:flex-start;gap:9px;padding:8px 14px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.sb-sh:hover{background:var(--bg)}
.sb-sh.act{background:var(--bg);border-left-color:var(--stcol,var(--s1))}
.sb-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--b3);flex-shrink:0;margin-top:3px;transition:all .15s}
.sb-sh.act .sb-dot{background:var(--stcol);border-color:var(--stcol)}
.sb-sh.dn .sb-dot{background:var(--ok);border-color:var(--ok)}
.sb-stlbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:2px}
.sb-sh.act .sb-stlbl{color:var(--stcol)}
.sb-stname{font-size:12px;font-weight:500;color:var(--t2);line-height:1.3}
.sb-sh.act .sb-stname{color:var(--t1)}
.sb-steps{padding:2px 14px 6px 32px}
.sb-step{font-size:11px;color:var(--t4);padding:3px 6px;border-radius:4px;cursor:pointer;display:flex;align-items:flex-start;gap:5px;transition:color .1s,background .1s;line-height:1.4}
.sb-step:hover{color:var(--t2)}
.sb-step.act{color:var(--t1);background:var(--card3)}
.sb-step.dn{color:var(--ok)}
.sb-step-pip{width:3px;height:3px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:5px}
.main{padding:28px 40px 80px;max-width:880px}
/* Overview */
.ov-bar{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--b);border-radius:12px;margin-bottom:22px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ov-logo{width:36px;height:36px;border-radius:8px;background:var(--s1l);border:1px solid var(--s1b);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px;font-weight:600;color:var(--s1);flex-shrink:0}
.ov-coname{font-size:14px;font-weight:600;color:var(--t1)}
.ov-cosub{font-size:11px;color:var(--t4)}
.ov-stats{margin-left:auto;display:flex;gap:22px}
.ov-stat-v{font-size:16px;font-weight:600;color:var(--t1);font-family:var(--mono);line-height:1}
.ov-stat-l{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.ov-h1{font-family:var(--serif);font-size:32px;font-weight:400;line-height:1.12;margin-bottom:9px;letter-spacing:-.01em}
.ov-h1 em{font-style:italic;color:var(--s1)}
.ov-sub{font-size:14px;color:var(--t2);line-height:1.78;max-width:580px;margin-bottom:26px}
.ov-prins{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.ov-prin{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:14px 15px}
.ov-pi{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.ov-pi svg{width:14px;height:14px}
.ov-ptitle{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--t1)}
.ov-ptext{font-size:11px;color:var(--t3);line-height:1.65}
.ov-stagelist{display:flex;flex-direction:column;margin-bottom:24px}
.ov-stcon{width:1px;height:16px;background:var(--b);margin-left:20px}
.ov-stage{display:grid;grid-template-columns:40px 1fr;cursor:pointer}
.ov-stage-left{display:flex;flex-direction:column;align-items:center;padding-top:14px}
.ov-snum{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--b2);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--t3);transition:all .15s}
.ov-stage:hover .ov-snum{border-color:var(--stcol);color:var(--stcol)}
.ov-scard{background:var(--card);border:1px solid var(--b);border-radius:10px;margin:6px 0 6px 10px;padding:13px 16px;transition:border-color .15s,box-shadow .15s}
.ov-stage:hover .ov-scard{border-color:var(--b2);box-shadow:0 1px 5px rgba(0,0,0,.05)}
.ov-sbadge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.ov-stitle{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:4px}
.ov-ssub{font-size:11px;color:var(--t3);line-height:1.55;margin-bottom:9px}
.ov-smeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ov-spill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;background:var(--card3);color:var(--t3);border:1px solid var(--b)}
.ov-cx{display:flex;align-items:center;gap:5px}
.ov-cx-lbl{font-size:10px;color:var(--t3)}
.ov-cxp{width:5px;height:5px;border-radius:50%;background:var(--b2)}
.ov-cxp.on{background:var(--stcol)}
.ov-btn{display:inline-flex;align-items:center;gap:8px;background:var(--s1);color:#fff;border:none;border-radius:9px;padding:11px 22px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .12s;letter-spacing:.01em}
.ov-btn:hover{background:#1E3A8A}
.ov-btn svg{width:13px;height:13px}
/* Stage */
.st-hdr{margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--b)}
.st-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.st-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 9px;border-radius:99px;border:1px solid}
.st-cx{display:flex;align-items:center;gap:6px}
.st-cx-lbl{font-size:10px;color:var(--t3)}
.st-cxp{width:6px;height:6px;border-radius:50%;background:var(--b2)}
.st-cxp.on{background:var(--stcol)}
.ai-driven-tag{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--ail);border:1px solid var(--aib);color:var(--ai)}
.ai-driven-tag svg{width:10px;height:10px}
.st-h2{font-family:var(--serif);font-size:24px;font-weight:400;line-height:1.2;margin-bottom:8px;color:var(--t1)}
.st-h2 em{font-style:italic;color:var(--stcol)}
.st-sub{font-size:13px;color:var(--t2);line-height:1.75;max-width:640px}
.ai-ctx{background:var(--ail);border:1px solid var(--aib);border-radius:10px;padding:12px 16px;margin-bottom:18px;display:flex;gap:12px;align-items:flex-start}
.ai-ctx-ic{width:26px;height:26px;background:rgba(30,64,175,.1);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-ctx-ic svg{width:13px;height:13px;color:var(--ai)}
.ai-ctx-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ai);margin-bottom:3px}
.ai-ctx-t{font-size:12px;color:var(--t2);line-height:1.65}
.ai-ctx-t strong{color:var(--t1);font-weight:500}
/* Step cards */
.step-list{display:flex;flex-direction:column;gap:9px}
.scard{background:var(--card);border:1px solid var(--b);border-radius:12px;overflow:hidden;transition:border-color .15s}
.scard:hover:not(.dn):not(.open){border-color:var(--b2)}
.scard.open{border-color:var(--stcol)}
.scard.dn{background:var(--card2);border-color:var(--b)}
.scard.locked{opacity:.4;pointer-events:none}
.sc-head{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;cursor:pointer}
.sc-head:hover{background:var(--card3)}
.scard.open .sc-head,.scard.dn .sc-head{background:transparent}
.scard.open .sc-head{background:var(--card3)}
.sc-n{width:26px;height:26px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--t3);flex-shrink:0;margin-top:2px;background:var(--card);transition:all .15s}
.scard.open .sc-n{border-color:var(--stcol);color:var(--stcol)}
.scard.dn .sc-n{border-color:var(--okb);color:var(--ok);background:transparent;font-size:9px;letter-spacing:0}
.sc-meta{flex:1;min-width:0}
.sc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;border:1px solid;white-space:nowrap}
.tag-ai{background:var(--ail);color:var(--ai);border-color:var(--aib)}
.tag-acct{background:#F5F3FF;color:#5B21B6;border-color:#DDD6FE}
.tag-pay{background:#F0FDF4;color:#15803D;border-color:#BBF7D0}
.tag-hr{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE}
.tag-int{background:#FFFBEB;color:#92400E;border-color:#FDE68A}
.tag-gate{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.tag-learn{background:#ECFDF5;color:#065F46;border-color:#A7F3D0}
.sc-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:3px;line-height:1.35}
.scard.dn .sc-title{color:var(--t3)}
.sc-sub{font-size:12px;color:var(--t3);line-height:1.5}
.sc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.sc-chev{width:15px;height:15px;color:var(--t4);transition:transform .18s}
.scard.open .sc-chev{transform:rotate(180deg)}
.sc-aitag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:99px;background:var(--ail);color:var(--ai);border:1px solid var(--aib);white-space:nowrap}
.confirmed-pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--okl);color:var(--ok);border:1px solid var(--okb)}
/* Body */
.sc-body{display:none;border-top:1px solid var(--b)}
.scard.open .sc-body{display:block}
.sc-body-in{padding:18px}
/* Gate */
.gate-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:7px;padding:9px 13px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.gate-box svg{width:12px;height:12px;color:var(--err);flex-shrink:0;margin-top:2px}
.gate-t{font-size:11px;color:#7F1D1D;line-height:1.6}
.gate-t strong{color:var(--err)}
/* AI section */
.ai-doing{background:var(--ail);border:1px solid var(--aib);border-radius:10px;padding:14px 15px;margin-bottom:15px}
.aid-h{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.aid-h svg{width:13px;height:13px;color:var(--ai)}
.aid-h-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ai)}
.aid-tasks{display:flex;flex-direction:column;gap:5px}
.aid-t{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;background:#fff;border:1px solid var(--b);border-radius:7px}
.aid-t.running{border-color:var(--aib)}
.aic{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.aic-done{background:var(--okl);border:1px solid var(--okb)}
.aic-done svg{width:8px;height:8px;color:var(--ok)}
.aic-run{background:var(--ail);border:1px solid var(--aib);animation:pring 2s ease-in-out infinite}
.aic-run svg{width:8px;height:8px;color:var(--ai);animation:spin 1.6s linear infinite}
.aic-wait{background:var(--card3);border:1px solid var(--b2)}
.aic-wait svg{width:8px;height:8px;color:var(--t4)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pring{0%,100%{box-shadow:0 0 0 0 rgba(30,64,175,.2)}50%{box-shadow:0 0 0 3px rgba(30,64,175,.07)}}
.aid-main{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:2px}
.aid-sub{font-size:11px;color:var(--t3);line-height:1.45}
.aid-result{margin-top:9px;padding:8px 11px;background:var(--okl);border:1px solid var(--okb);border-radius:6px;font-size:11px;color:var(--ok);display:none;line-height:1.55}
.aid-result svg{width:10px;height:10px;display:inline-block;vertical-align:middle;flex-shrink:0;margin-right:5px}
.aid-result.show{display:flex;align-items:flex-start;gap:6px}
/* Concept bridge */
.cb{border:1px solid #E9D5FF;border-radius:10px;overflow:hidden;margin-bottom:15px}
.cb-hdr{background:#F5F3FF;padding:9px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #E9D5FF}
.cb-hdr svg{width:12px;height:12px;color:#6D28D9}
.cb-hdr-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#6D28D9}
.cb-hdr-sub{font-size:11px;color:#8B5CF6;margin-left:auto}
.cb-body{padding:13px;background:#fff}
.cb-map{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:center;margin-bottom:11px}
.cb-side{padding:9px 12px;border-radius:7px}
.cb-from{background:var(--card3);border:1px solid var(--b)}
.cb-to{background:var(--s2l);border:1px solid var(--s2b)}
.cb-sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.cb-from .cb-sl{color:var(--t4)}
.cb-to .cb-sl{color:var(--s2)}
.cb-sv{font-size:11px;font-weight:500;color:var(--t1);font-family:var(--mono);margin-bottom:3px}
.cb-sd{font-size:11px;color:var(--t3);line-height:1.5}
.cb-arr{display:flex;flex-direction:column;align-items:center;gap:3px}
.cb-arr svg{width:18px;height:18px;color:#8B5CF6}
.cb-arr-lbl{font-size:9px;color:var(--t3)}
.cb-why{background:var(--card3);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:9px}
.cb-why strong{color:var(--t1);font-weight:500}
.cb-par{display:flex;gap:5px;flex-wrap:wrap}
.pc{font-size:9px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid}
.pc-full{background:var(--okl);color:var(--ok);border-color:var(--okb)}
.pc-part{background:var(--warnl);color:var(--warn);border-color:var(--warnb)}
.pc-gap{background:var(--errl);color:var(--err);border-color:var(--errb)}
/* Data sample */
.ds{background:var(--card2);border:1px solid var(--b);border-radius:9px;overflow:hidden;margin-bottom:15px}
.ds-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:var(--card3);border-bottom:1px solid var(--b)}
.ds-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}
.ds-count{font-size:10px;color:var(--t4)}
table.dst{width:100%;border-collapse:collapse;font-size:11px}
table.dst th{background:var(--card3);padding:6px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);border-bottom:1px solid var(--b)}
table.dst td{padding:7px 10px;border-bottom:1px solid var(--b);color:var(--t2);vertical-align:middle;line-height:1.4}
table.dst tr:last-child td{border-bottom:none}
table.dst tr:hover td{background:var(--card)}
.ds-mono{font-family:var(--mono);color:var(--t1)}
.dpill{display:inline-block;font-size:9px;font-weight:600;padding:1px 7px;border-radius:99px;border:1px solid;white-space:nowrap}
.dpill-ok{background:var(--okl);color:var(--ok);border-color:var(--okb)}
.dpill-warn{background:var(--warnl);color:var(--warn);border-color:var(--warnb)}
.dpill-err{background:var(--errl);color:var(--err);border-color:var(--errb)}
.dpill-info{background:var(--ail);color:var(--ai);border-color:var(--aib)}
.dpill-neu{background:var(--card3);color:var(--t3);border-color:var(--b2)}
/* Map rows */
.mapwrap{margin-bottom:15px}
.mapwrap-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:7px}
.maprows{display:flex;flex-direction:column;gap:3px}
.maprow{display:grid;grid-template-columns:1fr 20px 1fr 68px;gap:7px;align-items:center;padding:6px 9px;background:var(--card2);border:1px solid var(--b);border-radius:6px;transition:border-color .1s}
.maprow:hover{border-color:var(--b2)}
.maprow.ok{background:var(--okl);border-color:var(--okb)}
.mf{font-size:11px;font-family:var(--mono);color:var(--t1)}

.ms-rev{background:var(--warnl);color:var(--warn);border-color:var(--warnb)}
.ms-man{background:var(--errl);color:var(--err);border-color:var(--errb)}

.msi{display:flex;align-items:center;gap:4px}
.msdot{width:4px;height:4px;border-radius:50%}
/* Two column */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:15px}
.bglbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--b)}
.bglbl-ai{color:var(--ai)}
.bglbl-you{color:var(--s2)}
.bgpts{display:flex;flex-direction:column;gap:5px}
.bgpt{display:flex;gap:7px;align-items:flex-start}
.bgdot{width:3px;height:3px;border-radius:50%;flex-shrink:0;margin-top:7px}
.bgd-ai{background:var(--ai)}
.bgd-you{background:var(--s2)}
.bgt{font-size:12px;color:var(--t2);line-height:1.65}
.bgt strong{color:var(--t1);font-weight:500}
/* Decision */
.dec{background:var(--s3l);border:1px solid var(--s3b);border-radius:10px;padding:13px 15px;margin-bottom:15px}
.dec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--s3);margin-bottom:7px}
.dec-q{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:11px;line-height:1.4}
.dec-opts{display:flex;flex-direction:column;gap:5px}
.dec-opt{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border:1px solid var(--b);border-radius:7px;cursor:pointer;background:#fff;transition:border-color .1s}
.dec-opt:hover{border-color:var(--s3b)}
.dec-opt.sel{border-color:var(--s3)}
.dec-radio{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--b2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:border-color .1s}
.dec-opt.sel .dec-radio{border-color:var(--s3)}
.dec-rin{width:7px;height:7px;border-radius:50%;background:var(--s3);display:none}
.dec-opt.sel .dec-rin{display:block}
.dec-opt-t{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:2px}
.dec-opt-s{font-size:11px;color:var(--t3);line-height:1.5}
.dec-con{font-size:11px;padding:7px 10px;border-radius:6px;margin-top:9px;display:none}
.dec-con.show{display:block}
.dc-ok{background:var(--okl);color:var(--ok);border:1px solid var(--okb)}
.dc-warn{background:var(--warnl);color:var(--warn);border:1px solid var(--warnb)}
/* Deps */
.depstrip{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:9px 15px;border-top:1px solid var(--b);background:var(--card2)}
.dep-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-right:3px}
.depnode{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;border:1px solid;white-space:nowrap}
.dn-ok{background:var(--okl);color:var(--ok);border-color:var(--okb)}
.dn-req{background:var(--errl);color:var(--err);border-color:var(--errb)}
.dep-arr{font-size:10px;color:var(--t4)}
/* Complete row */
.cr{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-top:1px solid var(--b);background:var(--card2)}
.cr-l{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.cr-l svg{width:11px;height:11px;color:var(--ai)}
.crbtn{background:var(--stcol,var(--s1));color:#fff;border:none;border-radius:7px;padding:8px 16px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .12s}
.crbtn:hover{opacity:.86}
.crbtn:disabled{opacity:.3;cursor:default}
.crbtn svg{width:11px;height:11px}
/* Stage end */
.stage-end{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:18px 20px;margin-top:12px;display:none}
.stage-end.show{display:block}
.se-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ok);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.se-label svg{width:11px;height:11px}
.se-h{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--t1);margin-bottom:5px}
.se-sub{font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:13px}
.se-btn{display:inline-flex;align-items:center;gap:6px;background:var(--t1);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:background .12s}
.se-btn:hover{background:#1F2937}
.se-btn svg{width:12px;height:12px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:18px 18px 60px}
  .bgrid{grid-template-columns:1fr}
  .cb-map{grid-template-columns:1fr 18px 1fr}
  .ov-prins{grid-template-columns:1fr 1fr}
  .ov-stats{display:none}
}

/* NAV */
function rNav(){
  const pips=STAGES.map((s,i)=>{
    const d=s.steps.every(st=>done[st.id]),a=cur===i;
    return `<div class="npip s${i+1}${d?' dn':''}${a?' act':''}" title="${s.name}" onclick="goSt(${i})"></div>`;
  }).join('');
  document.getElementById('navPips').innerHTML=pips;
  document.getElementById('navPct').textContent=Math.round(doneN()/total()*100)+'%';
}
/* SIDEBAR */
function rSb(){
  const sb=document.getElementById('sidebar');
  let h=`<div class="sb-top"><button class="sb-ov${cur===-1?' act':''}" onclick="goOv()">${ic.ai} Overview</button></div>`;
  STAGES.forEach((s,si)=>{
    const a=cur===si,d=s.steps.every(st=>done[st.id]);
    h+=`<div class="sb-stage">
      <div class="sb-sh${a?' act':''}${d?' dn':''}" style="--stcol:${s.col}" onclick="goSt(${si})">
        <div class="sb-dot"></div>
        <div><div class="sb-stlbl">${s.badge}</div><div class="sb-stname">${s.name}</div></div>
      </div>`;
    if(a){
      h+=`<div class="sb-steps">`;
      s.steps.forEach(st=>{h+=`<div class="sb-step${done[st.id]?' dn':openSteps[st.id]?' act':''}" onclick="openSt('${st.id}')"><div class="sb-step-pip"></div>${st.title}</div>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  sb.innerHTML=h;
}

<div class="ov-bar">
  <div class="ov-logo">MCG</div>
  <div><div class="ov-coname">Meridian Construction Group</div><div class="ov-cosub">General Contractor · QBDT Enterprise 23.0 · 9 years of history</div></div>
  <div class="ov-stats">
    <div><div class="ov-stat-v">$8.2M</div><div class="ov-stat-l">Revenue</div></div>
    <div><div class="ov-stat-v">34</div><div class="ov-stat-l">Employees</div></div>
    <div><div class="ov-stat-v">CA/NV/AZ</div><div class="ov-stat-l">States</div></div>
    <div><div class="ov-stat-v">187</div><div class="ov-stat-l">Active jobs</div></div>
  </div>
</div>
<h1 class="ov-h1">Migration to <em>Intuit Enterprise Suite</em></h1>
<p class="ov-sub">A structured, AI-assisted journey — 5 stages, 18 steps, increasing complexity. AI performs the analytical and configuration work. You confirm accuracy, resolve exceptions, and sign off at each gate. Nothing moves until Stage 3.</p>
<div class="ov-prins">
  <div class="ov-prin"><div class="ov-pi" style="background:var(--ail)">${ic.ai}</div><div class="ov-ptitle">AI does the work</div><div class="ov-ptext">Reads your file, detects gaps, pre-fills all configurations, and monitors the first 90 days post go-live.</div></div>
  <div class="ov-prin"><div class="ov-pi" style="background:var(--s2l)"><svg viewBox="0 0 13 13" fill="none" style="width:13px;height:13px;color:var(--s2)"><path d="M2 6.5h9M7 2.5l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div><div class="ov-ptitle">Concepts in context</div><div class="ov-ptext">Customer:Job → Projects. Classes → Dimensions. Each translation shown using Meridian's actual data at the moment it matters.</div></div>
  <div class="ov-prin"><div class="ov-pi" style="background:var(--okl)"><svg viewBox="0 0 13 13" fill="none" style="width:13px;height:13px;color:var(--ok)"><path d="M2 6.5l3 3 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="ov-ptitle">Gates protect integrity</div><div class="ov-ptext">Accountant sign-off, validation pass, parallel run clearance. Nothing proceeds until each gate is confirmed.</div></div>
</div>
<div class="ov-stagelist">
${STAGES.map((s,i)=>`
${i?`<div class="ov-stcon"></div>`:''}
<div class="ov-stage" style="--stcol:${s.col}" onclick="goSt(${i})">
  <div class="ov-stage-left"><div class="ov-snum" style="border-color:${s.col};color:${s.col}">0${i+1}</div></div>
  <div class="ov-scard">
    <div class="ov-sbadge" style="color:${s.col}">${s.badge}</div>
    <div class="ov-stitle">${s.name.charAt(0).toUpperCase()+s.name.slice(1)}</div>
    <div class="ov-ssub">${s.sub}</div>
    <div class="ov-smeta">
      <span class="ov-spill">${s.steps.length} steps</span>
      ${s.ai?`<span class="ov-spill" style="color:var(--ai);border-color:var(--aib);background:var(--ail)">AI-driven</span>`:''}
      <div class="ov-cx"><span class="ov-cx-lbl">Complexity</span><div style="display:flex;gap:3px">${[1,2,3,4,5].map(n=>`<div class="ov-cxp${n<=s.cx?' on':''}" style="${n<=s.cx?`background:${s.col}`:''}"></div>`).join('')}</div></div>
    </div>
  </div>
</div>`).join('')}
</div>
<button class="ov-btn" onclick="goSt(0)">${ic.ai} Begin migration journey ${ic.nx}</button>`;
}
/* STAGE */
function rSt(si){
  const s=STAGES[si];
  const allDone=s.steps.every(st=>done[st.id]);
  const nxt=si<STAGES.length-1?STAGES[si+1]:null;
  const m=document.getElementById('main');
  m.innerHTML=`
<div class="st-hdr" style="--stcol:${s.col}">
  <div class="st-eyebrow">
    <span class="st-badge" style="color:${s.col};border-color:${s.col};background:${s.col}18">${s.badge}</span>
    <div class="st-cx"><span class="st-cx-lbl">Complexity</span><div style="display:flex;gap:3px">${[1,2,3,4,5].map(n=>`<div class="st-cxp${n<=s.cx?' on':''}" style="${n<=s.cx?`background:${s.col}`:''}"></div>`).join('')}</div></div>
    ${s.ai?`<div class="ai-driven-tag">${ic.ai} AI-driven</div>`:''}
  </div>
  <h2 class="st-h2" style="--stcol:${s.col}">${s.title}</h2>
  <p class="st-sub">${s.sub}</p>
</div>
${s.ai?`<div class="ai-ctx"><div class="ai-ctx-ic">${ic.ai}</div><div><div class="ai-ctx-lbl">AI-driven stage</div><div class="ai-ctx-t">In this stage, <strong>AI performs the analysis and configuration automatically</strong>. Your role is to review its output, confirm accuracy, and resolve the items that require business judgement.</div></div></div>`:''}
<div class="step-list">${s.steps.map((st,si2)=>rCard(st,s,si2)).join('')}</div>
<div class="stage-end${allDone?' show':''}" id="se_${s.id}">
  <div class="se-label">${ic.chk} Stage complete</div>
  <div class="se-h">${s.name.charAt(0).toUpperCase()+s.name.slice(1)} — confirmed</div>
  <div class="se-sub">${nxt?`All ${s.steps.length} steps confirmed. ${nxt.name.charAt(0).toUpperCase()+nxt.name.slice(1)} is next — complexity increases to ${nxt.cx} of 5.`:`Meridian Construction Group's migration journey is complete. Archive your QBDT file and confirm decommission with Lisa Park.`}</div>
  ${nxt?`<button class="se-btn" onclick="goSt(${si+1})">${ic.nx} Continue to ${nxt.name}</button>`:`<button class="se-btn" onclick="goOv()">Return to overview</button>`}
</div>`;
}
/* CARD */
function rCard(st,stage,si2){
  const o=openSteps[st.id],d=done[st.id],lk=si2>0&&!done[stage.steps[si2-1].id];
  return `<div class="scard${o?' open':''}${d?' dn':''}${lk?' locked':''}" id="card_${st.id}" style="--stcol:${stage.col}">
<div class="sc-head" onclick="togSt('${st.id}')">
  <div class="sc-n">${d?ic.chk:`<span>${st.n}</span>`}</div>
  <div class="sc-meta">
    <div class="sc-tags">${st.tags.map((t,i)=>`<span class="tag ${st.tc[i]}">${t}</span>`).join('')}</div>
    <div class="sc-title">${st.title}</div>
    <div class="sc-sub">${st.sub}</div>
  </div>
  <div class="sc-right">
    ${d?`<span class="confirmed-pill">Confirmed</span>`:st.aiTasks?`<span class="sc-aitag">${ic.ai} AI</span>`:''}
    <div class="sc-chev">${ic.ch}</div>
  </div>
</div>
${o?rBody(st,stage):''}
</div>`;
}
/* BODY */
function rBody(st,stage){
  let h=`<div class="sc-body"><div class="sc-body-in">`;
  if(st.gate) h+=`<div class="gate-box">${ic.gt}<div class="gate-t"><strong>Gate: </strong>${st.gate}</div></div>`;
  if(st.aiTasks?.length){
    const sm={done:'aic-done',run:'aic-run',wait:'aic-wait'};
    const sv={done:ic.chk,run:ic.sp,wait:ic.wt};
    h+=`<div class="ai-doing"><div class="aid-h">${ic.ai}<span class="aid-h-lbl">AI is handling for you</span></div>
<div class="aid-tasks">${st.aiTasks.map(t=>`<div class="aid-t${t.s==='run'?' running':''}"><div class="aic ${sm[t.s]}">${sv[t.s]}</div><div><div class="aid-main">${t.t}</div>${t.sub?`<div class="aid-sub">${t.sub}</div>`:''}</div></div>`).join('')}</div>
${st.aiResult?`<div class="aid-result show">${ic.chk} ${st.aiResult}</div>`:''}
</div>`;
  }
  if(st.concept){
    const c=st.concept;
    h+=`<div class="cb"><div class="cb-hdr"><svg viewBox="0 0 12 12" fill="none" style="width:12px;height:12px;color:#6D28D9"><path d="M2 6h8M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><span class="cb-hdr-t">Concept translation</span><span class="cb-hdr-sub">What changes and why</span></div>
<div class="cb-body">
<div class="cb-map">
  <div class="cb-side cb-from"><div class="cb-sl">${c.fl}</div><div class="cb-sv">${c.fv}</div><div class="cb-sd">${c.fd}</div></div>
  <div class="cb-arr"><svg viewBox="0 0 18 18" fill="none" style="width:18px;height:18px;color:#8B5CF6"><path d="M3 9h12M10 4l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><div class="cb-arr-lbl">becomes</div></div>
  <div class="cb-side cb-to"><div class="cb-sl">${c.tl}</div><div class="cb-sv">${c.tv}</div><div class="cb-sd">${c.td}</div></div>
</div>
<div class="cb-why"><strong>For Meridian: </strong>${c.why}</div>
${c.parity?`<div class="cb-par">${c.parity.map(p=>`<span class="pc pc-${p.c}">${p.c==='full'?'✓':p.c==='part'?'≈':'✗'} ${p.l}</span>`).join('')}</div>`:''}
</div></div>`;
  }
  if(st.sample){
    const s=st.sample;
    h+=`<div class="ds"><div class="ds-hdr"><span class="ds-lbl">${s.label}</span><span class="ds-count">${s.rows.length} records</span></div>
<table class="dst"><thead><tr>${s.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
<tbody>${s.rows.map(r=>`<tr>${r.map((cell,ci)=>{
  const pills={'Matched':'dpill dpill-ok','Clean':'dpill dpill-ok','Pending':'dpill dpill-neu'};
  const isPill=Object.keys(pills).some(k=>cell===k)||cell.startsWith('⚠');
  if(cell==='Matched'||cell==='Clean') return `<td><span class="dpill dpill-ok">${cell}</span></td>`;
  if(cell.startsWith('⚠')) return `<td><span class="dpill dpill-warn">${cell}</span></td>`;
  if(cell==='Pending…'||cell==='Running…') return `<td><span class="dpill dpill-neu">${cell}</span></td>`;
  if(cell.startsWith('Amber')) return `<td><span class="dpill dpill-warn">${cell}</span></td>`;
  const mono=ci===0||cell.startsWith('$')||/^\d{1,3},/.test(cell);
  return `<td${mono?' class="ds-mono"':''}>${cell}</td>`;
}).join('')}</tr>`).join('')}</tbody></table></div>`;
  }
  if(st.mapRows?.length){
    const auto=st.mapRows.filter(r=>r.s==='auto').length,rev=st.mapRows.filter(r=>r.s==='rev').length;
    h+=`<div class="mapwrap"><div class="mapwrap-lbl">AI pay item mapping — ${auto} auto-confirmed, ${rev} require review</div>
<div class="maprows">${st.mapRows.map(r=>`<div class="maprow${r.s==='auto'?' ok':''}">
<div class="mf">${r.f}</div><div class="ma"><svg viewBox="0 0 11 11" fill="none" style="width:11px;height:11px;color:var(--t4)"><path d="M2 5.5h7M7 3l2.5 2.5L7 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
<div class="mt">${r.t}</div><span class="ms2 ms-${r.s==='auto'?'auto':r.s==='rev'?'rev':'man'}">${r.s==='auto'?'Auto-matched':'Review'}</span>
</div>`).join('')}</div>
<div class="mapsummary"><div class="msi"><div class="msdot" style="background:var(--ok)"></div>${auto} auto-matched</div>${rev?`<div class="msi"><div class="msdot" style="background:var(--warn)"></div>${rev} review needed</div>`:''}</div>
</div>`;
  }
  if(st.aiCol&&st.youCol){
    h+=`<div class="bgrid">
<div><div class="bglbl bglbl-ai">AI handles automatically</div><div class="bgpts">${st.aiCol.map(t=>`<div class="bgpt"><div class="bgdot bgd-ai"></div><div class="bgt">${t}</div></div>`).join('')}</div></div>
<div><div class="bglbl bglbl-you">Your role</div><div class="bgpts">${st.youCol.map(t=>`<div class="bgpt"><div class="bgdot bgd-you"></div><div class="bgt">${t}</div></div>`).join('')}</div></div>
</div>`;
  }
  if(st.decision){
    const d2=st.decision,sel=picks[st.id];
    h+=`<div class="dec"><div class="dec-lbl">Decision required</div><div class="dec-q">${d2.q}</div>
<div class="dec-opts">${d2.opts.map((o,oi)=>`<div class="dec-opt${sel===oi?' sel':''}" onclick="pick2('${st.id}',${oi})">
<div class="dec-radio"><div class="dec-rin"></div></div>
<div><div class="dec-opt-t">${o.t}</div><div class="dec-opt-s">${o.sub}</div></div>
</div>`).join('')}</div>
${d2.opts.map((o,oi)=>sel===oi?`<div class="dec-con dc-${o.c} show">${o.ct}</div>`:``).join('')}
</div>`;
  }
  if(st.deps?.length){
    h+=`<div class="depstrip"><span class="dep-lbl">Requires</span>
${st.deps.map((d,i)=>`${i?`<span class="dep-arr">→</span>`:''}<span class="depnode dn-${d.s==='ok'?'ok':'req'}">${d.l}</span>`).join('')}
</div>`;
  }
  const d=done[st.id],nd=st.decision&&picks[st.id]===undefined;
  h+=`<div class="cr">
<div class="cr-l">${ic.ai} AI monitoring</div>
<button class="crbtn" ${d||nd?'disabled':''} onclick="markDone('${st.id}')" style="background:${stage.col}">
${d?ic.chk:ic.nx} ${d?'Confirmed':'Confirm & continue'}
</button>
</div>`;
  h+=`</div></div>`;
  return h;
}
/* INTERACTIONS */
function goOv(){cur=-1;rOv();rSb();rNav();}
function goSt(si){
  cur=si;
  const f=STAGES[si].steps.find(st=>!done[st.id]);
  if(f){Object.keys(openSteps).forEach(k=>delete openSteps[k]);openSteps[f.id]=true;}
  rSt(si);rSb();rNav();window.scrollTo({top:0,behavior:'smooth'});
}
function togSt(id){
  if(openSteps[id]){delete openSteps[id];}
  else{Object.keys(openSteps).forEach(k=>delete openSteps[k]);openSteps[id]=true;}
  if(cur>=0) rSt(cur);rSb();
}
function openSt(id){
  const si=STAGES.findIndex(s=>s.steps.some(st=>st.id===id));
  if(si>=0&&si!==cur){cur=si;}
  Object.keys(openSteps).forEach(k=>delete openSteps[k]);
  openSteps[id]=true;
  rSt(cur);rSb();rNav();
  setTimeout(()=>{const el=document.getElementById('card_'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}
function pick2(sid,oi){picks[sid]=oi;if(cur>=0)rSt(cur);rSb();}
function markDone(id){
  done[id]=true;delete openSteps[id];
  if(cur>=0){
    const s=STAGES[cur];
    const idx=s.steps.findIndex(st=>st.id===id);
    if(idx<s.steps.length-1)openSteps[s.steps[idx+1].id]=true;
  }
  rSt(cur);rSb();rNav();
  setTimeout(()=>{const el=document.getElementById(`se_s${cur+1}`);if(el&&el.classList.contains('show'))el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}
window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    document.getElementById('loader').classList.add('gone');
    goOv();openSteps[STAGES[0].steps[0].id]=true;
  },1500);
});
</script>
</body>
</html>
